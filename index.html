<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lo Show del Jolly</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Creepster&family=Special+Elite&family=Oswald:wght@400;700&display=swap');
:root{--parchment:#e8d9b0;--parchment-dark:#c9b87a;--bordeaux:#6b0f1a;--bordeaux-light:#9e1a28;--gold:#c9a227;--gold-light:#f0c030;--black:#1a1008;--green-dark:#1a3d1a;--cream:#f5eed8;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:radial-gradient(ellipse at center,#2a1505 0%,#0d0800 100%);font-family:'Oswald',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background-image:repeating-linear-gradient(45deg,transparent,transparent 35px,rgba(201,162,39,.06) 35px,rgba(201,162,39,.06) 70px);pointer-events:none;z-index:0;}
.screen{position:relative;z-index:10;display:none;width:100%;min-height:100vh;align-items:center;justify-content:center;flex-direction:column;padding:1.5rem 1rem;}
.screen.active{display:flex;}
.title-card{background:linear-gradient(160deg,var(--cream) 0%,var(--parchment) 50%,#d4c080 100%);border:6px solid var(--bordeaux);border-radius:18px;padding:2.5rem 2rem;max-width:560px;width:100%;text-align:center;box-shadow:0 0 40px rgba(201,162,39,.3),0 8px 32px rgba(0,0,0,.6),inset 0 1px 0 rgba(255,255,255,.4);position:relative;}
.title-card::before,.title-card::after{content:'♦';position:absolute;color:var(--bordeaux);font-size:1.2rem;opacity:.4;}
.title-card::before{top:12px;left:12px;}
.title-card::after{bottom:12px;right:12px;transform:rotate(180deg);}
.jolly-img-title{width:130px;height:auto;border-radius:10px;border:3px solid var(--bordeaux);box-shadow:0 4px 16px rgba(26,16,8,.7);margin-bottom:1rem;}
.main-title{font-family:'Creepster',cursive;font-size:clamp(2.2rem,8vw,3.8rem);color:var(--bordeaux);text-shadow:2px 2px 0 var(--gold),4px 4px 0 rgba(0,0,0,.3);line-height:1.1;letter-spacing:3px;margin-bottom:.4em;}
.subtitle-text{font-family:'Special Elite',cursive;color:var(--green-dark);font-size:clamp(.85rem,2.5vw,1.05rem);letter-spacing:2px;margin-bottom:2rem;border-top:1px solid var(--bordeaux);border-bottom:1px solid var(--bordeaux);padding:.4em 0;}
.choose-label{font-family:'Special Elite',cursive;color:var(--black);font-size:.95rem;margin-bottom:1.2rem;letter-spacing:1px;}
.player-cards{display:flex;gap:1.5rem;justify-content:center;flex-wrap:wrap;}
.player-card{cursor:pointer;background:linear-gradient(135deg,var(--bordeaux) 0%,#8b1020 100%);border:3px solid var(--gold);border-radius:12px;padding:1.5rem 2rem;text-align:center;transition:all .2s ease;min-width:140px;box-shadow:0 4px 12px rgba(0,0,0,.4);}
.player-card:hover{transform:translateY(-4px) scale(1.04);box-shadow:0 8px 24px rgba(201,162,39,.4);border-color:var(--gold-light);}
.player-emoji{font-size:2.8rem;display:block;margin-bottom:.4rem;}
.player-name{font-family:'Creepster',cursive;font-size:1.8rem;color:var(--gold-light);letter-spacing:3px;}
.top-bar{display:flex;align-items:center;gap:1rem;margin-bottom:1.2rem;}
.jolly-img-small{width:54px;height:auto;border-radius:6px;border:2px solid var(--bordeaux);}
.player-badge{font-family:'Creepster',cursive;font-size:1.4rem;color:var(--gold-light);letter-spacing:3px;text-shadow:0 0 10px rgba(201,162,39,.5);}
.machine{display:flex;align-items:center;gap:0;}
.slot-cabinet{background:linear-gradient(170deg,var(--parchment) 0%,#d4c080 30%,var(--parchment-dark) 100%);border:5px solid var(--bordeaux);border-radius:20px 20px 28px 28px;padding:16px 20px 22px;width:clamp(280px,58vw,390px);box-shadow:0 0 0 2px var(--gold),0 8px 32px rgba(0,0,0,.6),inset 0 2px 0 rgba(255,255,255,.5),inset 0 -4px 0 rgba(0,0,0,.2);position:relative;}
.cab-corner{position:absolute;font-size:.75rem;color:var(--bordeaux);opacity:.5;font-family:'Creepster',cursive;}
.cab-corner.tl{top:6px;left:8px;}
.cab-corner.tr{top:6px;right:8px;}
.cab-corner.bl{bottom:6px;left:8px;}
.cab-corner.br{bottom:6px;right:8px;}
.cabinet-header{text-align:center;margin-bottom:10px;border-bottom:2px solid var(--bordeaux);padding-bottom:8px;}
.cabinet-header-title{font-family:'Creepster',cursive;font-size:1.3rem;color:var(--bordeaux);letter-spacing:4px;text-shadow:1px 1px 0 var(--gold);}
.cabinet-lights{display:flex;justify-content:center;gap:6px;margin-top:5px;}
.bulb{width:8px;height:8px;border-radius:50%;animation:blink 1.2s infinite;}
.bulb:nth-child(odd){background:var(--bordeaux);box-shadow:0 0 5px var(--bordeaux);animation-delay:0s;}
.bulb:nth-child(even){background:var(--gold);box-shadow:0 0 5px var(--gold);animation-delay:.6s;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}
.screen-bezel{background:var(--black);border:4px solid var(--bordeaux);border-radius:10px;padding:5px;box-shadow:inset 0 0 20px rgba(0,0,0,.8),0 2px 8px rgba(107,15,26,.4);position:relative;}
.bezel-suit{position:absolute;font-size:.75rem;top:50%;transform:translateY(-50%);color:var(--bordeaux);opacity:.7;}
.bezel-suit.l{left:-1.1rem;}
.bezel-suit.r{right:-1.1rem;}
.slot-display{background:linear-gradient(180deg,#0d0800 0%,#1a1008 100%);border-radius:6px;min-height:220px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:1.2rem 1rem;position:relative;overflow:hidden;}
.slot-display::after{content:'';position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(201,162,39,.03) 3px,rgba(201,162,39,.03) 6px);pointer-events:none;border-radius:6px;}
.reel-wrap{position:relative;display:flex;align-items:center;justify-content:center;margin-bottom:8px;}
.reel-img{width:70px;height:70px;object-fit:cover;border-radius:8px;border:2px solid var(--gold);box-shadow:0 0 12px rgba(201,162,39,.3);}
.reel-img.spinning{animation:spinImg .12s linear infinite;}
@keyframes spinImg{0%{transform:scaleY(1)}25%{transform:scaleY(0)}50%{transform:scaleY(1)}75%{transform:scaleY(0)}100%{transform:scaleY(1)}}
.display-text{font-family:'Special Elite',cursive;color:var(--parchment);font-size:clamp(.8rem,2.3vw,.95rem);text-align:center;line-height:1.65;position:relative;z-index:1;}
.challenge-label{font-family:'Creepster',cursive;font-size:1rem;color:var(--gold-light);text-align:center;margin-bottom:6px;letter-spacing:2px;}
.chaos-msg{font-family:'Special Elite',cursive;font-size:.82rem;color:var(--gold);text-align:center;margin-top:10px;animation:pulse 1.8s ease-in-out infinite;line-height:1.5;display:none;z-index:1;position:relative;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.cabinet-bottom{display:flex;justify-content:space-between;align-items:center;margin-top:14px;padding-top:10px;border-top:2px solid var(--bordeaux);}
.coin-slot{display:flex;flex-direction:column;align-items:center;gap:3px;}
.coin-slot-hole{width:36px;height:7px;background:var(--black);border-radius:4px;border:2px solid var(--bordeaux);}
.coin-slot-label{font-size:.5rem;color:var(--bordeaux);letter-spacing:1px;font-family:'Oswald',sans-serif;font-weight:700;}
.reset-btn{background:linear-gradient(180deg,var(--bordeaux-light),var(--bordeaux));border:2px solid var(--gold);border-radius:50%;width:42px;height:42px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-direction:column;box-shadow:0 3px 0 #3a0008,0 0 8px rgba(107,15,26,.5);transition:all .15s;color:var(--parchment);font-family:'Oswald',sans-serif;font-size:.48rem;letter-spacing:.5px;font-weight:700;}
.reset-btn:hover{transform:translateY(2px);box-shadow:0 1px 0 #3a0008;}
.reset-btn:active{transform:translateY(3px);box-shadow:none;}
.reset-btn span{font-size:1rem;line-height:1;margin-bottom:1px;}
.lever-wrapper{display:flex;flex-direction:column;align-items:center;margin-left:18px;cursor:pointer;user-select:none;}
.lever-wrapper.disabled{pointer-events:none;opacity:.5;}
.lever-label{font-family:'Creepster',cursive;font-size:.75rem;color:var(--gold);letter-spacing:2px;margin-bottom:6px;text-shadow:0 0 6px rgba(201,162,39,.4);}
.lever-track{width:18px;height:170px;background:linear-gradient(90deg,#3a1a08,#6b3010,#3a1a08);border:2px solid var(--bordeaux);border-radius:9px;position:relative;box-shadow:0 0 8px rgba(107,15,26,.3);}
.lever-handle{position:absolute;left:50%;transform:translateX(-50%);top:8px;transition:top .4s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;align-items:center;}
.lever-handle.pulled{top:110px;}
.lever-ball{width:34px;height:34px;border-radius:50%;background:radial-gradient(circle at 35% 35%,var(--gold-light),var(--gold),#8b7000);border:3px solid var(--bordeaux);box-shadow:0 0 10px rgba(201,162,39,.5),inset 0 2px 4px rgba(255,255,255,.3);}
.lever-stick{width:5px;height:70px;background:linear-gradient(90deg,#8b6030,#c8a060,#8b6030);border-radius:3px;}
.flash-overlay{position:fixed;inset:0;background:var(--gold);opacity:0;pointer-events:none;z-index:100;}
.flash-overlay.flash{animation:flashAnim .5s ease-out;}
@keyframes flashAnim{0%{opacity:.5}100%{opacity:0}}
@media(max-width:500px){.machine{flex-direction:column;}.lever-wrapper{flex-direction:row;margin-left:0;margin-top:14px;gap:8px;}.lever-track{width:160px;height:18px;}.lever-handle{flex-direction:row;top:50%;left:8px;transform:translateY(-50%);transition:left .4s cubic-bezier(.4,0,.2,1);}.lever-handle.pulled{left:100px;top:50%;}.lever-stick{width:70px;height:5px;}}
</style>
</head>
<body>
<div class="flash-overlay" id="flash"></div>
<div class="screen active" id="title-screen">
  <div class="title-card">
    <div class="cab-corner tl">J</div><div class="cab-corner tr">J</div>
    <div class="cab-corner bl">J</div><div class="cab-corner br">J</div>
    <img id="jolly-title" class="jolly-img-title" alt="Jolly">
    <div class="main-title">LO SHOW<br>DEL JOLLY</div>
    <div class="subtitle-text">✦ CHI OSA SFIDARE IL CAOS? ✦</div>
    <div class="choose-label">Seleziona il tuo personaggio</div>
    <div class="player-cards">
      <div class="player-card" onclick="selectPlayer('Batman')">
        <span class="player-emoji">🦇</span>
        <div class="player-name">BATMAN</div>
      </div>
      <div class="player-card" onclick="selectPlayer('Robin')">
        <span class="player-emoji">😷</span>
        <div class="player-name">ROBIN</div>
      </div>
    </div>
  </div>
</div>
<div class="screen" id="slot-screen">
  <div class="top-bar">
    <img id="jolly-small" class="jolly-img-small" alt="Jolly">
    <div class="player-badge" id="player-badge">🦇 BATMAN</div>
  </div>
  <div class="machine">
    <div class="slot-cabinet">
      <div class="cab-corner tl">J ♦</div><div class="cab-corner tr">♦ J</div>
      <div class="cab-corner bl">J ♣</div><div class="cab-corner br">♣ J</div>
      <div class="cabinet-header">
        <div class="cabinet-header-title">✦ JOLLY'S CHAOS ✦</div>
        <div class="cabinet-lights">
          <div class="bulb"></div><div class="bulb"></div><div class="bulb"></div>
          <div class="bulb"></div><div class="bulb"></div><div class="bulb"></div>
          <div class="bulb"></div><div class="bulb"></div>
        </div>
      </div>
      <div class="screen-bezel">
        <div class="bezel-suit l">♦</div><div class="bezel-suit r">♣</div>
        <div class="slot-display">
          <div class="reel-wrap">
            <img id="reel-img" class="reel-img" alt="Jolly">
          </div>
          <div id="display-content"><div class="display-text">Tirare la leva<br>se non si teme il caos</div></div>
          <div class="chaos-msg" id="chaos-msg">✦ Vuoi creare ancora caos? ✦<br>Tira la leva nuovamente!</div>
        </div>
      </div>
      <div class="cabinet-bottom">
        <div class="coin-slot"><div class="coin-slot-hole"></div><div class="coin-slot-label">INSERT COIN</div></div>
        <button class="reset-btn" onclick="resetGame()"><span>↺</span>RESET</button>
        <div class="coin-slot"><div class="coin-slot-hole"></div><div class="coin-slot-label">INSERT COIN</div></div>
      </div>
    </div>
    <div class="lever-wrapper" id="lever" onclick="pullLever()">
      <div class="lever-label">TIRA!</div>
      <div class="lever-track">
        <div class="lever-handle" id="lever-handle">
          <div class="lever-ball"></div><div class="lever-stick"></div>
        </div>
      </div>
    </div>
  </div>
</div>

var currentPlayer='',usedBatman=[],usedRobin=[],usedBoth=[],isSpinning=false;
function selectPlayer(p){currentPlayer=p;document.getElementById('player-badge').textContent=p==='Batman'?'🦇 BATMAN':'😷 ROBIN';showScreen('slot-screen');resetDisplay();}
function showScreen(id){document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('active');});document.getElementById(id).classList.add('active');}
function pullLever(){
  if(isSpinning)return;isSpinning=true;
  var handle=document.getElementById('lever-handle');
  var lever=document.getElementById('lever');
  lever.classList.add('disabled');handle.classList.add('pulled');
  var img=document.getElementById('reel-img');
  img.classList.add('spinning');
  document.getElementById('chaos-msg').style.display='none';
  document.getElementById('display-content').innerHTML='<div class="display-text">Il Jolly sceglie il tuo destino...</div>';
  setTimeout(function(){
    img.classList.remove('spinning');
    var c=pickChallenge();
    var flash=document.getElementById('flash');
    flash.classList.add('flash');
    setTimeout(function(){flash.classList.remove('flash');},500);
    if(!c){
      document.getElementById('display-content').innerHTML='<div class="display-text" style="color:var(--gold-light);">Il Jolly è soddisfatto...<br>Tutte le prove sono state affrontate!</div>';
      document.getElementById('chaos-msg').style.display='none';
    } else {
      var lbl=c.type==='both'?'<div class="challenge-label">⚡ SFIDA DI COPPIA ⚡</div>':'<div class="challenge-label">🎯 PROVA PER '+currentPlayer.toUpperCase()+'</div>';
      document.getElementById('display-content').innerHTML=lbl+'<div class="display-text">'+c.text+'</div>';
      document.getElementById('chaos-msg').style.display='block';
    }
    setTimeout(function(){handle.classList.remove('pulled');lever.classList.remove('disabled');isSpinning=false;},600);
  },2500);
}
function pickChallenge(){
  var pool=[];
  if(currentPlayer==='Batman'){challengesBatman.forEach(function(t,i){if(usedBatman.indexOf(i)<0)pool.push({type:'batman',text:t,idx:i});});}
  else{challengesRobin.forEach(function(t,i){if(usedRobin.indexOf(i)<0)pool.push({type:'robin',text:t,idx:i});});}
  challengesBoth.forEach(function(t,i){if(usedBoth.indexOf(i)<0)pool.push({type:'both',text:t,idx:i});});
  if(!pool.length)return null;
  var c=pool[Math.floor(Math.random()*pool.length)];
  if(c.type==='batman')usedBatman.push(c.idx);
  else if(c.type==='robin')usedRobin.push(c.idx);
  else usedBoth.push(c.idx);
  return c;
}
function resetGame(){
  usedBatman=[];usedRobin=[];usedBoth=[];resetDisplay();
  var flash=document.getElementById('flash');
  flash.style.background='var(--bordeaux)';
  flash.classList.add('flash');
  setTimeout(function(){flash.classList.remove('flash');flash.style.background='var(--gold)';},500);
}
function resetDisplay(){
  document.getElementById('reel-img').classList.remove('spinning');
  document.getElementById('chaos-msg').style.display='none';
  document.getElementById('display-content').innerHTML='<div class="display-text">Tirare la leva<br>se non si teme il caos</div>';
  document.getElementById('lever-handle').classList.remove('pulled');
  document.getElementById('lever').classList.remove('disabled');
  isSpinning=false;
}
</script>
</body>
</html>
